<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBrief.ai | YouTube to Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115;
            --card-bg: #1a1d23;
            --accent: #c5f82a; 
            --text: #e0e0e0;
            --muted: #888ea1;
            --border: #2d323d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        header h1 {
            font-weight: 800;
            font-size: 3rem;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        header h1 span { color: var(--accent); }

        header p { color: var(--muted); font-size: 1.1rem; }

        /* Search Section */
        .search-box {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            gap: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 3rem;
            transition: all 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent); transform: scale(1.01); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 25px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px 35px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* Results Output */
        #output {
            display: none;
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            margin-top: 2rem;
        }

        #thumb {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .content-padding { padding: 50px; }

        #video-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            color: #fff;
            line-height: 1.2;
        }

        /* Note Styling */
        #notes-content h2 { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 1rem; }
        #notes-content h3 { color: #fff; margin-top: 2.5rem; margin-bottom: 1rem; font-size: 1.3rem; }
        #notes-content p { color: var(--text); margin-bottom: 1.5rem; opacity: 0.9; font-size: 1.05rem; }
        #notes-content hr { border: 0; border-top: 1px solid var(--border); margin: 3rem 0; }

        /* Loader */
        .loader { display: none; text-align: center; margin: 3rem 0; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Study<span>Brief</span></h1>
            <p>Paste a link. Get a professional lecture brief.</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="url" placeholder="Enter YouTube URL..." autocomplete="off">
            <button onclick="generateNotes()">Analyze</button>
        </div>

        <div id="loading" class="loader">
            <div class="spinner"></div>
            <p style="color: var(--muted)">Parsing transcript & structuring brief...</p>
        </div>

        <div id="output">
            <img id="thumb" src="">
            <div class="content-padding">
                <h2 id="video-title"></h2>
                <div id="notes-content"></div>
            </div>
        </div>
    </div>

    <script>
        async function generateNotes() {
            const urlInput = document.getElementById('url');
            const loading = document.getElementById('loading');
            const output = document.getElementById('output');
            
            if(!urlInput.value.trim()) return alert("Please enter a YouTube link.");

            loading.style.display = 'block';
            output.style.display = 'none';

            try {
                const response = await fetch('http://127.0.0.1:5000/generate-notes', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: urlInput.value })
                });
                
                const data = await response.json();

                if(data.success) {
                    document.getElementById('video-title').innerText = data.title;
                    document.getElementById('notes-content').innerHTML = data.notes;
                    document.getElementById('thumb').src = data.thumbnail;
                    output.style.display = 'block';
                    output.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("Error: " + data.error);
                }
            } catch (e) {
                alert("Server connection failed. Is app.py running?");
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
